version: '1.0'

jobs:

  runs-on: java-ci-base:latest

  test:
    steps:
      - name: Clone Repository
        run: git clone https://github.com/Sectani/test-gradle-app app

      - name: Run Tests
        working-directory: app/project
        run: |
          ./gradlew test
          mkdir -p /artifacts/test-reports
          cp -r build/test-results/test/* /artifacts/test-reports/

  build:
    depends-on: test
    steps:
      - name: Clone Repository
        run: git clone https://github.com/Sectani/test-gradle-app app

      - name: Build Project
        working-directory: app/project
        run: ./gradlew build -x test

      - name: Save Artifacts
        run: cp build/libs/*.jar /artifacts/

  # Optional: Deploy to Staging
  deploy_staging:
    depends-on: build
    steps:
     - name: Deploy to Staging Environment
       run: |
         echo "Deploying to staging environment..."  # Replace with actual deployment script or command
